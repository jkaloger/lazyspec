[package]
name = "lazyspec"
version = "0.1.0"
edition = "2021"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
pulldown-cmark = "0.12"
tui-markdown = "0.3"
nucleo = "0.5"
notify = "7"
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
anyhow = "1"
serde_json = "1"

[dev-dependencies]
tempfile = "3"
